<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Face Matcher</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>

  <header>
    <h1>⚽ Which footballer do you look like?</h1>
    <p>Upload a photo and we'll match your face to the nearest player</p>
  </header>

  <label class="upload-zone" for="upload">
    <input type="file" id="upload" accept="image/*">
    <span class="upload-icon">📷</span>
    <span>Click to upload or drag a photo here</span>
  </label>

  <p id="status" class="status"></p>

  <div id="result" class="result-card" hidden>
    <div id="avatar" class="avatar"></div>
    <div class="result-details">
      <p id="result-name" class="result-name"></p>
      <p id="result-score" class="result-score"></p>
      <div class="bar-track"><div id="bar" class="bar-fill"></div></div>
    </div>
  </div>

  <p class="section-label" id="roster-label" hidden>Roster</p>
  <div id="roster" class="players-grid"></div>

</body>
</html>
